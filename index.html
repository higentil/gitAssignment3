<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern JS Calculator</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    
   
    <main class="calculator-container">
        
        <div class="theme-toggle-container">
            <span class="theme-label">Theme</span>
            <button type="button" id="theme-toggle-btn" class="theme-toggle-btn" aria-label="Toggle Theme">
                <span class="toggle-icon">🌙</span>
            </button>
        </div>
        
        <div class="calculator-display" id="display" aria-live="polite">0</div>
        
        <div class="calculator-grid">
            <button type="button" class="btn btn-clear" data-action="clear">C</button>
            <button type="button" class="btn btn-operator" data-action="divide">÷</button>
            <button type="button" class="btn btn-operator" data-action="multiply">×</button>
            <button type="button" class="btn btn-operator" data-action="subtract">-</button>

            <button type="button" class="btn btn-number">7</button>
            <button type="button" class="btn btn-number">8</button>
            <button type="button" class="btn btn-number">9</button>
            <button type="button" class="btn btn-operator" data-action="add">+</button>

            <button type="button" class="btn btn-number">4</button>
            <button type="button" class="btn btn-number">5</button>
            <button type="button" class="btn btn-number">6</button>
            <button type="button" class="btn btn-equals" data-action="calculate">=</button>

            <button type="button" class="btn btn-number">1</button>
            <button type="button" class="btn btn-number">2</button>
            <button type="button" class="btn btn-number">3</button>
            <button type="button" class="btn btn-number btn-zero">0</button>
        </div>

    </main>

    <script src="scripts/main.js" defer></script>
</body>
</html>
